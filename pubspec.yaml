name: jewello
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  carousel_slider: ^5.0.0
  persistent_bottom_nav_bar: any

  # Firebase packages (Temp for migration)
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.2

  # State Management
  supabase_flutter: ^2.8.3
  get: ^4.7.2
  get_storage: ^2.1.1

  razorpay_flutter: ^1.3.5

  # image
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400

    - family: Kurale
      fonts:
        - asset: assets/fonts/Kurale-Regular.ttf
          weight: 400

    - family: Libre Caslon Display
      fonts:
        - asset: assets/fonts/LibreCaslonDisplay-Regular.ttf
          weight: 400

    - family: Antic Didone
      fonts:
        - asset: assets/fonts/AnticDidone-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/jw.png"
  min_sdk_android: 21
